services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: p2p_yzta_backend
    ports:
      - "8000:8000"
    volumes:
      - uploads_data:/app/uploads
      - chroma_data:/app/data
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - RAG_DATA_DIR=/app/data
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: p2p_yzta_frontend
    ports:
      - "8501:8501"
    environment:
      - BASE_URL=http://backend:8000/api
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  uploads_data:
  chroma_data:
